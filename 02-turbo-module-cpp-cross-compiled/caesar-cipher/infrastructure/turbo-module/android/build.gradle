buildscript {
  ext.kotlin_version = rootProject.ext.has("kotlinVersion") ? rootProject.ext.get("kotlinVersion") : "2.1.20"
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath("com.android.tools.build:gradle:8.7.2")
    classpath("com.facebook.react:react-native-gradle-plugin")
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
  }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
  jsRootDir = file("../js")
  libraryName = "CaesarSpec"
  codegenJavaPackageName = "com.facebook.fbreact.specs"
}

def getExtOrDefault(name, defaultValue) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : defaultValue
}

android {
  namespace "com.nicovegasr.caesar"
  compileSdkVersion getExtOrDefault("compileSdkVersion", 36)
  if (rootProject.hasProperty("ndkVersion")) {
    ndkVersion rootProject.ext.ndkVersion
  }

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion", 24)
  }

  buildFeatures {
    prefab true
    buildConfig true
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
}
